[build]
publish = "client"
command = "echo 'No client build required'" 

[functions]
directory = "netlify/functions"
node_bundler = "esbuild"

# CRITICAL: This rule captures the /api/ prefix PLUS the rest of the path 
# (like /register or /login) and sends it to the serverless function.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"  # 'server' matches your server.mjs filename
  status = 200
  force = true

# This ensures users hitting the root URL go to the login page.
[[redirects]]
  from = "/"
  to = "/login.html"
  status = 302