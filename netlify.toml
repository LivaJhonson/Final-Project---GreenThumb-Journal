[build]
publish = "client"
command = "echo 'No client build required'" 

[functions]
directory = "netlify/functions"
node_bundler = "esbuild"

# CRITICAL: Fixes the 404/502 errors by passing the full path to the function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat" 
  status = 200
  force = true

[[redirects]]
  from = "/"
  to = "/login.html"
  status = 302